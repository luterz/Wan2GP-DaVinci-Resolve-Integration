<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Wan2GP Resolve AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0b0b;
            --bg-panel: #1c1e20;
            --bg-input: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #9ea2ad;
            --accent: #d1fe17;
            --accent-text: #000000;
            --accent-hover: #b8e010;
            --accent-success: #d1fe17;
            --accent-danger: #ef4444;
            --border-color: #2a2c30;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            padding: 16px;
            margin: 0;
            font-size: 13px;
        }

        h2 { 
            margin-top: 0; 
            margin-bottom: 16px; 
            font-weight: 600; 
            font-size: 18px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
        }

        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-size: 12px; 
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .range-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .range-value {
            min-width: 30px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-size: 12px;
        }

        .btn {
            background-color: var(--accent);
            color: var(--accent-text);
            border: none;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:hover:not(:disabled) { 
            background-color: var(--accent-hover); 
            transform: translateY(-1px);
        }
        .btn:active:not(:disabled) {
            transform: translateY(0);
        }
        .btn:disabled { 
            background-color: var(--border-color); 
            color: var(--text-muted);
            cursor: not-allowed; 
        }
        .btn-success { background-color: var(--accent-success); color: var(--accent-text); }
        .btn-success:hover:not(:disabled) { background-color: var(--accent-hover); }
        .btn-danger { background-color: var(--accent-danger); color: white; }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
        }

        #maskEditor {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .canvas-wrapper {
            position: relative; 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        
        #refVideo {
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: 0; 
            object-fit: fill; 
            display: none;
        }
        
        #maskCanvas {
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: 0; 
            cursor: crosshair; 
            opacity: 0.6; 
            z-index: 10;
        }

        .status-box {
            background-color: #0a0a0a;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-family: "JetBrains Mono", "Consolas", monospace;
            font-size: 11px;
            min-height: 80px;
            max-height: 150px;
            overflow-y: auto;
            color: #a3e635;
        }

        .server-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-panel);
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-red { background-color: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.6); }
        .dot-green { background-color: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); }

        .server-controls {
            display: flex;
            gap: 8px;
        }
        
        .btn-secondary {
            background-color: #374151;
            color: white;
        }
        .btn-secondary:hover:not(:disabled) {
            background-color: #4b5563;
        }
    </style>
</head>
<body>
    <h2>Wan2GP Resolve AI <span class="badge">PRO</span></h2>

    <div class="server-status-bar">
        <div class="status-indicator">
            <span id="serverDot" class="dot dot-red"></span>
            <span id="serverLabel">Orchestrator: Offline</span>
        </div>
        <div class="server-controls" style="align-items: center;">
            <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; margin-right: 8px; font-size: 11px; color: var(--text-muted);">
                <input type="checkbox" id="hideTerminalCheckbox" style="width: auto; margin: 0;">
                Hide Terminal
            </label>
            <button id="restartServerBtn" class="btn-secondary btn-small">Start/Restart</button>
            <button id="stopServerBtn" class="btn-danger btn-small">Stop</button>
        </div>
    </div>
    
    <div class="panel">
        <div class="row">
            <div class="col">
                <label for="taskProfile">Task Profile</label>
                <select id="taskProfile">
                    <option value="inpaint">🎨 Inpaint / Masking (LTX-2 & VACE)</option>
                    <option value="generate_i2v">🎬 Generate i2v</option>
                    <option value="audio_tts">🔊 Audio TTS</option>
                </select>
            </div>
            <div class="col">
                <label for="modelSelect">Model</label>
                <select id="modelSelect"></select>
            </div>
        </div>
        
        <div class="row">
            <div class="col">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--accent-success);">
                    <input type="checkbox" id="fastAttention" checked style="width: auto; margin: 0;">
                    ⚡ Use SageAttention / Triton (Faster)
                </label>
            </div>
        </div>

        <div id="videoParams">
            <div class="row">
                <div class="col">
                    <label for="outRes">Target Resolution</label>
                    <select id="outRes">
                        <option value="832x480">832x480 (VACE default)</option>
                        <option value="1280x720">1280x720 (16:9 HD)</option>
                        <option value="768x512">768x512 (3:2)</option>
                        <option value="512x768">512x768 (2:3 Vertical)</option>
                        <option value="480x832">480x832 (9:16 Vertical)</option>
                        <option value="1920x1080">1920x1080 (FHD)</option>
                        <option value="1024x1024">1024x1024 (1:1)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label for="steps">Sampling Steps <span class="range-value" id="stepsVal">30</span></label>
                    <div class="range-wrapper">
                        <input type="range" id="steps" min="4" max="100" value="30">
                    </div>
                </div>
                <div class="col">
                    <label for="cfgScale">CFG Scale <span class="range-value" id="cfgVal">7.5</span></label>
                    <div class="range-wrapper">
                        <input type="range" id="cfgScale" min="1.0" max="15.0" step="0.5" value="7.5">
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="durationRow" style="display: none;">
            <div class="col">
                <label for="durationSeconds">Duration (seconds) <span class="range-value" id="durationVal">4</span></label>
                <div class="range-wrapper">
                    <input type="range" id="durationSeconds" min="1" max="120" step="1" value="4">
                </div>
            </div>
        </div>

        <div class="row" id="audioParams" style="display: none;">
            <div class="col">
                <label for="modelMode">Language (Voice Only)</label>
                <select id="modelMode">
                    <option value="auto">Auto-detect</option>
                    <option value="english">English</option>
                    <option value="italian">Italian</option>
                    <option value="chinese">Chinese</option>
                    <option value="japanese">Japanese</option>
                    <option value="korean">Korean</option>
                    <option value="german">German</option>
                    <option value="french">French</option>
                    <option value="spanish">Spanish</option>
                    <option value="russian">Russian</option>
                    <option value="portuguese">Portuguese</option>
                </select>
            </div>
        </div>

        <div class="row" id="altPromptRow" style="display: none;">
            <div class="col">
                <label for="altPrompt">Voice/Music Style (Optional)</label>
                <textarea id="altPrompt" placeholder="e.g. cheerful, dramatic, 120bpm pop rock..." rows="2"></textarea>
            </div>
        </div>

        <div class="row" id="referenceImageRow" style="display: none;">
            <div class="col">
                <label for="referenceImageInput" style="color: var(--accent-success);">Reference Image (EditAnything / Face Swap)</label>
                <input type="file" id="referenceImageInput" accept="image/*" style="background: var(--bg-panel); color: var(--text-main); border: 1px dashed var(--border-color); padding: 8px;">
                <img id="referenceImagePreview" style="display:none; max-width: 100px; max-height: 100px; margin-top: 8px; border-radius: 4px; border: 1px solid var(--border-color);">
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label for="prompt" style="margin: 0;">Prompt</label>
            <button id="deepyBtn" class="btn-secondary btn-small" style="background: linear-gradient(135deg, #6366f1, #a855f7); border: none;">
                ✨ Optimize with Deepy
            </button>
        </div>
        <textarea id="prompt" placeholder="Describe what you want to generate in the masked area..."></textarea>
    </div>

    <button id="processBtn" class="btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        Extract & Process
    </button>

    <div id="maskEditor" class="panel">
        <div class="row" style="align-items: center; justify-content: space-between;">
            <label style="margin: 0; font-size: 14px; color: var(--text-main);">Mask Editor</label>
            <div style="display: flex; gap: 12px; align-items: center;">
                <label style="margin:0;">Brush: <span id="brushVal" style="color:var(--text-main)">30</span></label>
                <input type="range" id="brushSize" min="5" max="100" value="30" style="width: 100px;">
                <button id="clearMaskBtn" class="btn btn-danger btn-small">Clear</button>
            </div>
        </div>
        
        <div class="canvas-wrapper" id="canvasContainer">
            <video id="refVideo" muted playsinline></video>
            <canvas id="maskCanvas"></canvas>
        </div>
        
        <button id="submitJobBtn" class="btn btn-success">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            Send Job to AI
        </button>
    </div>

    <label>System Log</label>
    <div id="statusLog" class="status-box">System initialized. Awaiting instructions...</div>

    <script src="app.js"></script>
</body>
</html>
