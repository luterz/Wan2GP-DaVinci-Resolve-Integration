<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Wan2GP Resolve AI - Native UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0b0b;
            --bg-panel: #1c1e20;
            --text-main: #ffffff;
            --text-muted: #9ea2ad;
            --accent: #d1fe17;
            --accent-text: #000000;
            --accent-hover: #b8e010;
            --border-color: #2a2c30;
            --radius-sm: 6px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            flex-shrink: 0;
        }

        .toolbar-title {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }

        .btn {
            background-color: var(--accent);
            color: var(--accent-text);
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn:hover { background-color: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary {
            background-color: #374151;
            color: white;
        }
        .btn-secondary:hover { background-color: #4b5563; }

        .iframe-container {
            flex: 1;
            width: 100%;
            background-color: #0b0b0b;
            position: relative;
            min-height: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Loading overlay shown while Wan2GP starts */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            gap: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
        }

        .gallery-bar {
            height: 120px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            padding: 12px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            align-items: center;
            flex-shrink: 0;
        }

        .gallery-item {
            width: 160px;
            height: 90px;
            background-color: #000;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .gallery-item:hover { border-color: var(--accent); }

        .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .insert-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.15s;
        }
        .insert-btn:hover {
            background: var(--accent);
            color: var(--accent-text);
        }

        .empty-gallery {
            color: var(--text-muted);
            font-size: 12px;
            margin: auto;
        }

        #statusLog {
            position: absolute;
            bottom: 140px;
            right: 16px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            font-family: monospace;
            font-size: 11px;
            color: #a3e635;
            max-width: 400px;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-title">
            Wan2GP Native <span class="badge">PRO</span>
        </div>
        <div style="display: flex; gap: 8px;">
            <button id="restartServerBtn" class="btn btn-secondary" style="padding: 4px 8px; font-size: 10px;">
                Restart API
            </button>
            <button id="openBrowserBtn" class="btn btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                Apri nel Browser
            </button>
            <button id="extractBtn" class="btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                Estrai Clip
            </button>
        </div>
    </div>

    <div class="iframe-container">
        <iframe id="wanui" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">
                Wan2GP si sta avviando...<br>
                <span style="font-size:11px; color:#666;">Se non si avvia, clicca "Restart API"</span>
            </div>
        </div>
        <div id="statusLog">Pronto</div>
    </div>

    <div class="gallery-bar" id="galleryContainer">
        <div class="empty-gallery">Nessun output recente. Genera qualcosa in Wan2GP!</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
